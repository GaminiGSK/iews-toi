steps:
  # 1. Build the full monorepo image using Dockerfile from root
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILD_DATE=$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/iews-toi'
      - '.'

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/iews-toi']

  # 3. Deploy to Cloud Run (iews-toi service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'iews-toi'
      - '--image'
      - 'gcr.io/$PROJECT_ID/iews-toi'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--update-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/iews-toi'
